umber">7</span>).<span class="title function_">fill</span>(<span class="number">1</span>);</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(arr)</span><br><span class="line"></span><br><span class="line"><span class="comment">// 矩阵(二维数组)</span></span><br><span class="line"><span class="keyword">const</span> arr2 = [</span><br><span class="line">  [<span class="number">1</span>,<span class="number">2</span>,<span class="number">3</span>,<span class="number">4</span>],</span><br><span class="line">  [<span class="number">1</span>,<span class="number">2</span>,<span class="number">3</span>,<span class="number">4</span>],</span><br><span class="line">  [<span class="number">1</span>,<span class="number">2</span>,<span class="number">3</span>,<span class="number">4</span>],</span><br><span class="line">  [<span class="number">1</span>,<span class="number">2</span>,<span class="number">3</span>,<span class="number">4</span>]</span><br><span class="line">]</span><br><span class="line"></span><br><span class="line"><span class="comment">// 栈</span></span><br><span class="line"><span class="comment">/* 只允许从尾部添加元素,只允许从尾部取出元素 */</span></span><br><span class="line"><span class="keyword">const</span> stack = <span class="keyword">new</span> <span class="title class_">Array</span>();</span><br><span class="line">stack.<span class="title function_">push</span>(<span class="string">&#x27;货物A&#x27;</span>);</span><br><span class="line">stack.<span class="title function_">push</span>(<span class="string">&#x27;货物B&#x27;</span>);</span><br><span class="line">stack.<span class="title function_">push</span>(<span class="string">&#x27;货物C&#x27;</span>);</span><br><span class="line">stack.<span class="title function_">push</span>(<span class="string">&#x27;货物D&#x27;</span>);</span><br><span class="line"><span class="keyword">while</span> (stack.<span class="property">length</span> &gt; <span class="number">0</span>) &#123;</span><br><span class="line">  <span class="variable language_">console</span>.<span class="title function_">log</span>(stack[stack.<span class="property">length</span> - <span class="number">1</span>] + <span class="string">&#x27; 已卖出&#x27;</span>)</span><br><span class="line">  stack.<span class="title function_">pop</span>();</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 队列</span></span><br><span class="line"><span class="comment">/* 只允许从尾部添加元素,只允许从头部添加元素 */</span></span><br><span class="line"><span class="keyword">const</span> queue = [];</span><br><span class="line">queue.<span class="title function_">push</span>(<span class="string">&#x27;顾客 1&#x27;</span>)</span><br><span class="line">queue.<span class="title function_">push</span>(<span class="string">&#x27;顾客 2&#x27;</span>)</span><br><span class="line">queue.<span class="title function_">push</span>(<span class="string">&#x27;顾客 3&#x27;</span>)</span><br><span class="line">queue.<span class="title function_">push</span>(<span class="string">&#x27;顾客 4&#x27;</span>)</span><br><span class="line"><span class="keyword">while</span>(queue.<span class="property">length</span> &gt; <span class="number">0</span>) &#123;</span><br><span class="line">  <span class="variable language_">console</span>.<span class="title function_">log</span>(queue[<span class="number">0</span>] + <span class="string">&#x27; 已取餐&#x27;</span>)</span><br><span class="line">  queue.<span class="title function_">shift</span>()</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 链表</span></span><br><span class="line"><span class="comment">/* 链表的插入/删除效率高，但访问效率低，数组的访问效率高，但插入效率低 */</span></span><br><span class="line"><span class="keyword">function</span> <span class="title function_">ListNode</span>(<span class="params">val=<span class="literal">null</span></span>) &#123;</span><br><span class="line">  <span class="variable language_">this</span>.<span class="property">val</span> = val;</span><br><span class="line">  <span class="variable language_">this</span>.<span class="property">next</span> = <span class="literal">null</span>;</span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">const</span> head = <span class="keyword">new</span> <span class="title class_">ListNode</span>()</span><br><span class="line"><span class="keyword">const</span> node1 = <span class="keyword">new</span> <span class="title class_">ListNode</span>(<span class="number">1</span>);</span><br><span class="line"><span class="keyword">const</span> node2 = <span class="keyword">new</span> <span class="title class_">ListNode</span>(<span class="number">2</span>);</span><br><span class="line"><span class="keyword">const</span> node3 = <span class="keyword">new</span> <span class="title class_">ListNode</span>(<span class="number">3</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 添加链表元素 */</span></span><br><span class="line">head.<span class="property">next</span> = node1</span><br><span class="line">node1.<span class="property">next</span> = node2</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 插入链表元素：将node3插入到node1与node2之间, 重心在目标节点的前驱节点 */</span></span><br><span class="line">node3.<span class="property">next</span> = node1.<span class="property">next</span>;</span><br><span class="line">node1.<span class="property">next</span> = node3;</span><br><span class="line"></span><br><span class="line"><span class="comment">/*  删除链表元素node3；只需要遍历时可以跳过目标元素即可 (将目标元素的前驱元素的next等于 后驱元素的next) */</span></span><br><span class="line">node1.<span class="property">next</span> = node3.<span class="property">next</span></span><br><span class="line"></span><br><span class="line"><span class="comment">/*  遍历链表,访问链表 */</span></span><br><span class="line"><span class="keyword">let</span> target = head;</span><br><span class="line"><span class="keyword">const</span> idx = <span class="number">2</span>;</span><br><span class="line"><span class="keyword">for</span> (<span class="keyword">let</span> i = <span class="number">0</span>; i &lt; idx; i++) &#123;</span><br><span class="line">  target = target.<span class="property">next</span></span><br><span class="line">&#125;</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(target)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">/* 树由根节点 节点 叶节点 组成；从叶节点到根节点的层级为高度,一个节点开叉多少个子树被称为度 */</span></span><br><span class="line"></span><br><span class="line"><span class="comment">// 二叉树</span></span><br><span class="line"><span class="comment">/* 二叉树可以没有根节点作为一颗空树存在；</span></span><br><span class="line"><span class="comment">  否则，它由根节点和左子树以及右子树连结，且左子树和右子树都是二叉树，是不能调换的</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="keyword">function</span> <span class="title function_">TreeNode</span>(<span class="params">val = <span class="literal">null</span></span>)&#123;</span><br><span class="line">  <span class="variable language_">this</span>.<span class="property">val</span> = val;</span><br><span class="line">  <span class="variable language_">this</span>.<span class="property">left</span> = <span class="variable language_">this</span>.<span class="property">right</span> = <span class="literal">null</span>;</span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">const</span> tree = <span class="keyword">new</span> <span class="title class_">TreeNode</span>(<span class="string">&#x27;A&#x27;</span>);</span><br><span class="line"></span><br><span class="line"><span class="keyword">const</span> temp_tree = &#123;</span><br><span class="line">  <span class="attr">val</span>: <span class="string">&#x27;A&#x27;</span>,</span><br><span class="line">  <span class="attr">left</span>:  &#123;</span><br><span class="line">    <span class="attr">val</span>: <span class="string">&#x27;B&#x27;</span>,</span><br><span class="line">    <span class="attr">left</span>:  &#123; <span class="attr">val</span>: <span class="string">&#x27;D&#x27;</span>, <span class="attr">right</span>: <span class="literal">null</span>, <span class="attr">left</span>: <span class="literal">null</span> &#125;,</span><br><span class="line">    <span class="attr">right</span>:  &#123; <span class="attr">val</span>: <span class="string">&#x27;E&#x27;</span>, <span class="attr">right</span>: <span class="literal">null</span>, <span class="attr">left</span>: <span class="literal">null</span> &#125;</span><br><span class="line">  &#125;,</span><br><span class="line">  <span class="attr">right</span>:  &#123;</span><br><span class="line">    <span class="attr">val</span>: <span class="string">&#x27;C&#x27;</span>,</span><br><span class="line">    <span class="attr">left</span>: <span class="literal">null</span>,</span><br><span class="line">    <span class="attr">right</span>:  &#123; <span class="attr">val</span>: <span class="string">&#x27;F&#x27;</span>, <span class="attr">right</span>: <span class="literal">null</span>, <span class="attr">left</span>: <span class="literal">null</span> &#125;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(tree)</span><br><span class="line"></span><br><span class="line"><span class="comment">// 中序遍历</span></span><br><span class="line"><span class="comment">// 所有遍历函数的入参都是树的根结点对象</span></span><br><span class="line"><span class="keyword">function</span> <span class="title function_">preorder</span>(<span class="params">root</span>) &#123;</span><br><span class="line">  <span class="comment">// 递归边界，root 为空</span></span><br><span class="line">  <span class="keyword">if</span>(!root) &#123;</span><br><span class="line">    <span class="keyword">return</span> </span><br><span class="line">  &#125;</span><br><span class="line">  <span class="comment">// 输出当前遍历的结点值</span></span><br><span class="line">  <span class="variable language_">console</span>.<span class="title function_">log</span>(<span class="string">&#x27;当前遍历的结点值是：&#x27;</span>, root.<span class="property">val</span>)  </span><br><span class="line">  <span class="comment">// 递归遍历左子树 </span></span><br><span class="line">  <span class="title function_">preorder</span>(root.<span class="property">left</span>)  </span><br><span class="line">  <span class="comment">// 递归遍历右子树  </span></span><br><span class="line">  <span class="title function_">preorder</span>(root.<span class="property">right</span>)</span><br><span class="line">&#125;</span><br><span class="line"><span class="variable language_">console</span>.<span class="title function_">log</span>(temp_tree);</span><br><span class="line"><span class="title function_">preorder</span>(temp_tree);</span><br></pre></td></tr></table></figure></div><script src="https://jsd.onmicrosoft.cn/npm/hexo-theme-a4@latest/source/js/lightgallery.min.js"></script><script>if (typeof lightGallery !== 'undefined') {
